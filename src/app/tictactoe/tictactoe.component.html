<div class="tictactoe-container">
  <h2>Tic Tac Toe</h2>

  <div class="score-board">
    <div [class.active]="currentPlayer === 'X'">Player X: {{ scores.X }}</div>
    <div [class.active]="currentPlayer === 'O'">Player O: {{ scores.O }}</div>
  </div>

  <div class="status-message" *ngIf="winner">
    Winner: Player {{ winner }}!
  </div>
  <div class="status-message" *ngIf="isDraw">
    It's a Draw no luck!
  </div>
  <div class="status-message" *ngIf="!winner && !isDraw">
    Current Turn: Player {{ currentPlayer }}
  </div>

  <div class="board">
    <div
      *ngFor="let cell of board; let i = index"
      class="cell"
      [class.x]="cell === 'X'"
      [class.o]="cell === 'O'"
      (click)="makeMove(i)"
    >
      {{ cell }}
    </div>
  </div>

  <button class="reset-btn" (click)="resetGame()">Reset Game</button>
</div>
