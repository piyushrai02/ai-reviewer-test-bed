<div class="todo-container">
  <h2>My Todo List</h2>

  <div class="add-todo-form">
    <input
      type="text"
      [(ngModel)]="newTodoTitle"
      (keyup.enter)="addTodo()"
      placeholder="What needs to be done?"
      class="todo-input"
    >
    <button (click)="addTodo()" [disabled]="!newTodoTitle.trim()" class="add-btn">Add</button>
  </div>

  <ul class="todo-list">
    <li *ngFor="let todo of todos$ | async" class="todo-item">
      <input
        type="checkbox"
        [checked]="todo.completed"
        (change)="toggleTodo(todo.id)"
        class="todo-checkbox"
      >
      <span [class.completed]="todo.completed" class="todo-text">{{ todo.title }}</span>
      <button (click)="deleteTodo(todo.id)" class="delete-btn">Delete</button>
    </li>
  </ul>

  <div *ngIf="(todos$ | async)?.length === 0" class="empty-state">
    <p>No todos yet. Add one above!</p>
  </div>
</div>
